name: Publish to NuGet
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'bump') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup NuGet source (DinaupSoftware GitHub Packages)
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github-dsl \
            "https://nuget.pkg.github.com/DinaupSoftware/index.json"

      - name: Restore dependencies
        run: dotnet restore src/DinaZen.csproj

      - name: Build
        run: dotnet build src/DinaZen.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/DinaZen.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push ./nupkg/*.nupkg \
            --source github \
            --skip-duplicate

      - name: Publish to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET }} --skip-duplicate
